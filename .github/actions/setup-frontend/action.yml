name: "Setup Frontend"
description: "Setup pnpm + Node, and install frontend dependencies"

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: "pnpm"
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      working-directory: frontend
      run: pnpm install --frozen-lockfile
