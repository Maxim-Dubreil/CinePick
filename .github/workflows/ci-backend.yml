name: CI Backend

on:
  push:
    branches: [develop, main]
    paths:
      - "backend/**"
      - ".github/actions/setup-backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"
      - ".github/actions/setup-backend/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-backend

      - name: Run Ruff
        working-directory: backend
        run: ruff check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-backend

      - name: Run Pyright
        working-directory: backend
        run: pyright

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-backend

      - name: Run pytest
        working-directory: backend
        run: pytest

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
    env:
      SUPABASE_URL: https://fake.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key-for-smoke-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-backend

      - name: Start FastAPI server in background
        working-directory: backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Server is up after ${i} seconds"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in 30 seconds"
          exit 1

      - name: Hit /health endpoint
        run: |
          response=$(curl -sf http://localhost:8000/health)
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"' || exit 1

      - name: Stop server
        if: always()
        run: |
          kill $(cat /tmp/uvicorn.pid) || true
